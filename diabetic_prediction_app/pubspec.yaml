name: diabetic_prediction_app
description: An offline Edge AI Flutter application for diabetic prediction.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  tflite_flutter: any
  image_picker: ^1.1.0
  sqflite: ^2.3.0
  path_provider: ^2.1.3
  path: ^1.9.0
  provider: ^6.1.2
  image: ^4.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/images/
